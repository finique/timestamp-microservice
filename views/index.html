<!DOCTYPE html>
<html>
<head>

    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
    h1 { text-align: center; }
    code { background: #eee; padding: 2px 6px; border-radius: 3px; }
